services:
  - type: web
    name: mw-craft
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20.15.1
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/game.db
    disk:
      name: mw-craft-data
      mountPath: /var/data
      sizeGB: 1
